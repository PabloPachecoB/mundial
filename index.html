<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=600, height=600, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Mundial 2026 · HUD</title>
<!-- Logo (favicon) que se ve en la pestaña del navegador: balón con acento verde -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23000'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%2300e676' stroke-width='3'/%3E%3Cpolygon points='32,20 41,27 38,38 26,38 23,27' fill='%2300e676'/%3E%3Cpath d='M32 6 L32 12 M32 52 L32 58 M6 32 L12 32 M52 32 L58 32' stroke='%23fff' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
<style>
  /* ====== Reset / base para HUD monocular 600x600 ====== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body {
    width: 600px; height: 600px;
    background: #000;            /* negro puro */
    color: #fff;                 /* texto blanco alto contraste */
    overflow: hidden;
    font-family: "Segoe UI", "Roboto", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    position: relative;
    width: 600px; height: 600px;
    background: #000;
    overflow: hidden;
    touch-action: none;          /* gestionamos swipe nosotros */
  }

  /* ====== Cabecera de pestañas ====== */
  #tabs {
    position: absolute; top: 0; left: 0; right: 0;
    height: 70px;
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
    z-index: 5;
  }
  .tab {
    font-size: 26px; font-weight: 800; letter-spacing: 1px;
    color: #555;                 /* inactiva = gris tenue */
    transition: color .2s;
  }
  .tab.active { color: #fff; }
  .tab.active.live { color: #00e676; } /* acento verde */
  .tab-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: #00e676; margin-left: 8px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }

  /* ====== Indicador vertical de pestaña (puntos a la izquierda) ====== */
  #vdots {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 14px; z-index: 5;
  }
  .vdot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: background .2s, transform .2s; }
  .vdot.on { background: #00e676; transform: scale(1.35); }

  /* ====== Zona de partido ====== */
  #stage { position: absolute; top: 70px; left: 0; right: 0; bottom: 60px; }
  .match {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 40px;
    text-align: center;
  }

  .competition {
    font-size: 18px; font-weight: 700; letter-spacing: 3px;
    color: #00e676; text-transform: uppercase; margin-bottom: 8px;
  }

  .status {
    font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 26px;
    text-transform: uppercase;
  }
  .status.live   { color: #00e676; }
  .status.final  { color: #bdbdbd; }
  .status.upcoming { color: #fff; }
  .status .ko-day  { display:block; font-size:16px; color:#00e676; letter-spacing:3px; margin-bottom:6px; }
  .status .ko-main { display:block; font-size:30px; font-weight:900; letter-spacing:1px; }
  .status .ko-main small { font-size:14px; color:#888; font-weight:700; text-transform:none; }
  .status .live-dot {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    background: #00e676; margin-right: 8px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }

  /* fila de marcador: ABR  marcador  ABR */
  .scoreline {
    display: flex; align-items: center; justify-content: center; gap: 28px;
    width: 100%;
  }
  .team { display: flex; flex-direction: column; align-items: center; width: 150px; }
  .abbr { font-size: 64px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
  .name { font-size: 16px; color: #888; margin-top: 10px; font-weight: 600; }

  .score {
    font-size: 120px; font-weight: 900; line-height: .9;
    min-width: 200px;
  }
  .score.tbd { font-size: 70px; color: #444; }
  .score .sep { color: #00e676; }

  /* probabilidad para PRÓXIMOS */
  .prob-wrap { width: 100%; margin-top: 38px; }
  .prob-label { font-size: 16px; color: #888; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
  .prob-bar {
    position: relative; height: 26px; border-radius: 13px; overflow: hidden;
    background: #1b1b1b; display: flex;
  }
  .prob-home { background: #00e676; height: 100%; }
  .prob-draw { background: #555; height: 100%; }
  .prob-away { background: #fff; height: 100%; }
  .prob-nums { display: flex; justify-content: space-between; margin-top: 10px; font-size: 18px; font-weight: 800; }
  .prob-nums .pn span { display: block; font-size: 13px; color: #888; font-weight: 600; }

  /* ====== Pie: contador de partidos + flechas ====== */
  #footer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    display: flex; align-items: center; justify-content: center; gap: 18px; z-index: 5;
  }
  #hdots { display: flex; gap: 9px; }
  .hdot { width: 9px; height: 9px; border-radius: 50%; background: #333; transition: background .2s, transform .2s; }
  .hdot.on { background: #fff; transform: scale(1.3); }
  .arrow { font-size: 24px; color: #444; font-weight: 900; }

  /* estado vacío / carga / error */
  .notice {
    position: absolute; inset: 70px 0 60px 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; text-align: center; padding: 0 50px;
  }
  .notice .big { font-size: 30px; font-weight: 900; }
  .notice .sub { font-size: 18px; color: #888; }
  .notice .src { font-size: 14px; color: #00e676; letter-spacing: 1px; }

  /* ====== RESULTADOS: cards de grupos + tabla desplegable ====== */
  #stage.scroll { overflow-y: auto; overflow-x: hidden; }
  #stage.scroll::-webkit-scrollbar { width: 0; }
  .groups { padding: 8px 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .gcard {
    background: #0d0d0d; border: 2px solid #1c1c1c; border-radius: 14px;
    overflow: hidden; transition: border-color .15s;
  }
  .gcard.focused { border-color: #00e676; }
  .ghead { display: flex; align-items: center; gap: 10px; padding: 16px 18px; }
  .gname { font-size: 26px; font-weight: 900; letter-spacing: 1px; flex: 1; }
  .gmeta { font-size: 14px; color: #777; font-weight: 700; }
  .gchev { font-size: 18px; color: #00e676; font-weight: 900; transition: transform .2s; }
  .gcard.open .gchev { transform: rotate(180deg); }

  .gtable { padding: 0 10px 12px; }
  .gtable table { width: 100%; border-collapse: collapse; }
  .gtable th, .gtable td { padding: 8px 3px; text-align: center; font-size: 17px; }
  .gtable th { color: #666; font-size: 12px; font-weight: 800; border-bottom: 1px solid #222; }
  .gtable td.pos  { color: #777; font-weight: 800; width: 20px; }
  .gtable td.team { text-align: left; font-weight: 800; white-space: nowrap; }
  .gtable th.teamh{ text-align: left; }
  .gtable td.pts  { color: #00e676; font-weight: 900; }
  .gtable tr.qual td.team, .gtable tr.qual td.pos { color: #00e676; }
  .gtable tr.qual { background: rgba(0,230,118,.06); }
  .qbadge { color: #00e676; font-weight: 900; margin-left: 5px; }
  .glegend { font-size: 12px; color: #666; padding: 6px 8px 0; }
  .glegend b { color: #00e676; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ====== CELEBRACIÓN DE GOL: papelitos + cartel ====== */
  #fx { position:absolute; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
  .confetti {
    position:absolute; top:-24px; width:10px; height:16px; border-radius:2px;
    opacity:.95; animation: confFall linear forwards;
  }
  @keyframes confFall { to { transform: translateY(680px) rotate(var(--r,720deg)); } }
  .goalbanner {
    position:absolute; inset:0; z-index:61; pointer-events:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .goalbanner .g {
    font-size:92px; font-weight:900; color:#00e676; letter-spacing:4px;
    text-shadow:0 0 30px rgba(0,230,118,.65); animation: goalPop .5s ease-out;
  }
  .goalbanner .gt { font-size:28px; font-weight:800; color:#fff; margin-top:4px; letter-spacing:1px; }
  @keyframes goalPop { 0%{transform:scale(.3);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }

  /* animación de entrada al cambiar de partido/pestaña */
  .anim { animation: fade .18s ease-out; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <div id="tabs"></div>
  <div id="vdots"></div>
  <div id="stage"></div>
  <div id="footer">
    <span class="arrow">‹</span>
    <div id="hdots"></div>
    <span class="arrow">›</span>
  </div>
</div>

<script>
/* =====================================================================
   CONFIGURACIÓN DE LA API  (edítala aquí)
   ---------------------------------------------------------------------
   Conectado a TheSportsDB (GRATIS, sin registro, permite CORS desde el
   navegador). La clave "3" es la pública de prueba. Si tienes una clave
   Patreon propia, ponla en API_KEY para más resultados y livescore.
   Si la API falla o viene vacía, se usan los DATOS DE RESPALDO.
   ===================================================================== */
const API_CONFIG = {
  ENABLED:   true,                             // true = datos reales
  API_KEY:   "3",                              // "3" = clave pública de prueba
  BASE_URL:  "https://www.thesportsdb.com/api/v1/json",
  LEAGUE_ID: 4429,                             // 4429 = FIFA World Cup
  SEASON:    "2026"
};

/* =====================================================================
   DATOS DE RESPALDO (fallback) — se usan si la API no responde
   ===================================================================== */
const FALLBACK_DATA = {
  live: [
    { comp: "GRUPO A", home: "MEX", homeName: "México",   away: "CAN", awayName: "Canadá",
      hs: 2, as: 1, status: "live", minute: "67'" },
    { comp: "GRUPO B", home: "ARG", homeName: "Argentina", away: "BRA", awayName: "Brasil",
      hs: 0, as: 0, status: "live", minute: "23'" },
    { comp: "GRUPO C", home: "ESP", homeName: "España",   away: "GER", awayName: "Alemania",
      hs: 1, as: 1, status: "live", minute: "81'" },
  ],
  results: [
    { comp: "GRUPO A", home: "USA", homeName: "EE.UU.",   away: "JPN", awayName: "Japón",
      hs: 3, as: 2, status: "final" },
    { comp: "GRUPO D", home: "FRA", homeName: "Francia",  away: "ENG", awayName: "Inglaterra",
      hs: 1, as: 2, status: "final" },
    { comp: "GRUPO E", home: "POR", homeName: "Portugal", away: "URU", awayName: "Uruguay",
      hs: 2, as: 0, status: "final" },
    { comp: "GRUPO F", home: "NED", homeName: "Países Bajos", away: "CRO", awayName: "Croacia",
      hs: 1, as: 1, status: "final" },
  ],
  upcoming: [
    { comp: "GRUPO B", home: "ARG", homeName: "Argentina", away: "MEX", awayName: "México",
      status: "upcoming", time: "19:00", probHome: 58, probDraw: 24, probAway: 18 },
    { comp: "GRUPO C", home: "ESP", homeName: "España",   away: "FRA", awayName: "Francia",
      status: "upcoming", time: "21:00", probHome: 41, probDraw: 27, probAway: 32 },
    { comp: "GRUPO G", home: "BEL", homeName: "Bélgica",  away: "COL", awayName: "Colombia",
      status: "upcoming", time: "16:00", probHome: 47, probDraw: 28, probAway: 25 },
  ]
};

/* =====================================================================
   TABLAS DE GRUPOS DE RESPALDO (12 grupos A–L)
   Formato por equipo: [ABR, nombre, G, E, P, GF, GC]
   normalizeGroups() calcula PJ, PTS, DG, ordena y marca los 2 primeros
   como clasificados (✓). Se usan si la tabla real viene truncada/vacía.
   ===================================================================== */
const FALLBACK_GROUPS_RAW = [
  { name:"GRUPO A", teams:[["MEX","México",3,0,0,7,2],["CRO","Croacia",1,1,1,4,3],["NOR","Noruega",1,0,2,3,5],["RSA","Sudáfrica",0,1,2,2,6]] },
  { name:"GRUPO B", teams:[["CAN","Canadá",2,1,0,5,2],["BEL","Bélgica",2,0,1,6,3],["MAR","Marruecos",1,1,1,3,3],["KSA","Arabia Saudí",0,0,3,1,7]] },
  { name:"GRUPO C", teams:[["USA","EE.UU.",2,1,0,6,3],["ENG","Inglaterra",2,1,0,5,2],["IRN","Irán",1,0,2,2,4],["PAN","Panamá",0,0,3,1,5]] },
  { name:"GRUPO D", teams:[["ARG","Argentina",3,0,0,8,1],["SRB","Serbia",1,1,1,4,4],["TUN","Túnez",1,0,2,2,5],["AUS","Australia",0,1,2,2,6]] },
  { name:"GRUPO E", teams:[["BRA","Brasil",2,1,0,7,2],["JPN","Japón",1,1,1,3,3],["CMR","Camerún",1,0,2,3,4],["CRC","Costa Rica",0,1,2,1,5]] },
  { name:"GRUPO F", teams:[["FRA","Francia",2,1,0,6,2],["DEN","Dinamarca",1,2,0,4,2],["KOR","Corea",1,0,2,3,5],["GHA","Ghana",0,1,2,2,6]] },
  { name:"GRUPO G", teams:[["ESP","España",3,0,0,9,2],["URU","Uruguay",1,1,1,4,3],["EGY","Egipto",1,0,2,2,5],["QAT","Catar",0,1,2,1,6]] },
  { name:"GRUPO H", teams:[["POR","Portugal",2,1,0,5,1],["SUI","Suiza",1,1,1,3,3],["NGA","Nigeria",1,1,1,3,3],["UZB","Uzbekistán",0,1,2,1,5]] },
  { name:"GRUPO I", teams:[["NED","Países Bajos",2,1,0,6,2],["SEN","Senegal",2,0,1,5,3],["POL","Polonia",1,0,2,3,4],["JAM","Jamaica",0,1,2,2,7]] },
  { name:"GRUPO J", teams:[["GER","Alemania",2,1,0,6,2],["ECU","Ecuador",1,2,0,3,1],["ALG","Argelia",1,0,2,2,4],["JOR","Jordania",0,1,2,1,5]] },
  { name:"GRUPO K", teams:[["ITA","Italia",2,1,0,5,2],["COL","Colombia",2,0,1,5,3],["CIV","Costa de Marfil",1,0,2,3,5],["NZL","Nueva Zelanda",0,1,2,2,5]] },
  { name:"GRUPO L", teams:[["PER","Perú",2,1,0,4,1],["CHI","Chile",1,1,1,3,2],["CZE","Chequia",1,0,2,3,4],["HON","Honduras",0,1,2,1,4]] },
];

/* Calcula PJ/PTS/DG, ordena y marca clasificados (2 primeros por defecto) */
function normalizeGroups(raw) {
  return raw.map(grp => {
    const teams = grp.teams.map(t => {
      if (Array.isArray(t)) {
        const [a,n,g,e,p,gf,gc] = t;
        return { abbr:a, name:n, g, e, p, gf, gc, pj:g+e+p, pts:g*3+e, gd:gf-gc };
      }
      return t;
    });
    teams.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    const anyQ = teams.some(t => t.qualified);
    teams.forEach((t,i) => { if (t.qualified === undefined) t.qualified = !anyQ && i < 2; });
    return { name: grp.name, teams };
  });
}
const FALLBACK_GROUPS = normalizeGroups(FALLBACK_GROUPS_RAW);
FALLBACK_DATA.groups = FALLBACK_GROUPS;

/* =====================================================================
   PESTAÑAS
   ===================================================================== */
const TABS = [
  { key: "live",     label: "EN VIVO"   },
  { key: "results",  label: "RESULTADOS"},
  { key: "upcoming", label: "PRÓXIMOS"  },
];

let DATA = FALLBACK_DATA;     // se reemplaza si la API responde
let tabIndex = 0;             // pestaña actual (vertical)
let matchIndex = [0, 0, 0];   // índice de partido por pestaña (horizontal)

/* =====================================================================
   RENDERIZADO
   ===================================================================== */
const $tabs   = document.getElementById("tabs");
const $vdots  = document.getElementById("vdots");
const $stage  = document.getElementById("stage");
const $hdots  = document.getElementById("hdots");

function renderTabs() {
  $tabs.innerHTML = "";
  TABS.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = "tab" + (i === tabIndex ? " active" : "") + (t.key === "live" ? " live" : "");
    el.textContent = t.label;
    if (t.key === "live" && (DATA.live || []).length) {
      const dot = document.createElement("span");
      dot.className = "tab-dot";
      if (i === tabIndex) el.appendChild(dot);
    }
    $tabs.appendChild(el);
  });

  $vdots.innerHTML = "";
  TABS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "vdot" + (i === tabIndex ? " on" : "");
    $vdots.appendChild(d);
  });
}

function currentList() {
  const key = TABS[tabIndex].key;
  if (key === "results") return DATA.groups || [];   // RESULTADOS navega por grupos
  return DATA[key] || [];
}

function renderStage() {
  $hdots.innerHTML = "";
  if (TABS[tabIndex].key === "results") { renderGroups(); return; }
  $stage.classList.remove("scroll");
  const list = currentList();
  $stage.innerHTML = "";

  if (!list.length) {
    const n = document.createElement("div");
    n.className = "notice anim";
    n.innerHTML = `
      <div class="big">${TABS[tabIndex].key === "live" ? "Sin partidos en vivo" : "Sin partidos"}</div>
      <div class="sub">Desliza ↑ ↓ para cambiar de pestaña</div>`;
    $stage.appendChild(n);
    return;
  }

  // clamp del índice
  if (matchIndex[tabIndex] >= list.length) matchIndex[tabIndex] = list.length - 1;
  if (matchIndex[tabIndex] < 0) matchIndex[tabIndex] = 0;
  const m = list[matchIndex[tabIndex]];

  const wrap = document.createElement("div");
  wrap.className = "match anim";

  let statusHtml = "";
  if (m.status === "live") {
    statusHtml = `<div class="status live"><span class="live-dot"></span>EN VIVO · ${m.minute || ""}</div>`;
  } else if (m.status === "final") {
    statusHtml = `<div class="status final">FINAL</div>`;
  } else {
    statusHtml = `<div class="status upcoming">
      ${m.day ? `<span class="ko-day">${m.day}</span>` : ""}
      <span class="ko-main">${m.time || "—"} <small>tu hora local</small></span></div>`;
  }

  const hasScore = (m.status === "live" || m.status === "final");
  const scoreHtml = hasScore
    ? `<div class="score"><span>${m.hs}</span><span class="sep"> - </span><span>${m.as}</span></div>`
    : `<div class="score tbd">VS</div>`;

  let probHtml = "";
  if (m.status === "upcoming" && m.probHome != null) {
    probHtml = `
      <div class="prob-wrap">
        <div class="prob-label">Probabilidad de victoria</div>
        <div class="prob-bar">
          <div class="prob-home" style="width:${m.probHome}%"></div>
          <div class="prob-draw" style="width:${m.probDraw}%"></div>
          <div class="prob-away" style="width:${m.probAway}%"></div>
        </div>
        <div class="prob-nums">
          <div class="pn">${m.probHome}%<span>${m.home}</span></div>
          <div class="pn">${m.probDraw}%<span>EMPATE</span></div>
          <div class="pn">${m.probAway}%<span>${m.away}</span></div>
        </div>
      </div>`;
  }

  wrap.innerHTML = `
    <div class="competition">${m.comp || ""}</div>
    ${statusHtml}
    <div class="scoreline">
      <div class="team"><div class="abbr">${m.home}</div><div class="name">${m.homeName || ""}</div></div>
      ${scoreHtml}
      <div class="team"><div class="abbr">${m.away}</div><div class="name">${m.awayName || ""}</div></div>
    </div>
    ${probHtml}`;
  $stage.appendChild(wrap);

  // puntos horizontales (partidos)
  list.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "hdot" + (i === matchIndex[tabIndex] ? " on" : "");
    $hdots.appendChild(d);
  });
}

/* ====== RESULTADOS: cards de grupos con tabla desplegable ====== */
function renderGroups() {
  const groups = DATA.groups || [];
  $stage.innerHTML = "";
  $stage.classList.add("scroll");

  if (!groups.length) {
    $stage.classList.remove("scroll");
    const n = document.createElement("div");
    n.className = "notice anim";
    n.innerHTML = `<div class="big">Sin tablas de grupos</div>
      <div class="sub">Desliza ↑ ↓ para cambiar de pestaña</div>`;
    $stage.appendChild(n);
    return;
  }

  // grupo enfocado/seleccionado (reutiliza el índice horizontal)
  let fi = matchIndex[tabIndex];
  if (fi >= groups.length) fi = groups.length - 1;
  if (fi < 0) fi = 0;
  matchIndex[tabIndex] = fi;

  const cont = document.createElement("div");
  cont.className = "groups anim";

  groups.forEach((g, i) => {
    const open = i === fi;                          // el seleccionado se despliega
    const card = document.createElement("div");
    card.className = "gcard" + (open ? " focused open" : "");

    let html = `<div class="ghead">
        <span class="gname">${g.name}</span>
        <span class="gmeta">${open ? "" : g.teams.length + " equipos"}</span>
        <span class="gchev">▾</span>
      </div>`;

    if (open) {
      let rows = "";
      g.teams.forEach((t, idx) => {
        const dg = t.gd > 0 ? "+" + t.gd : t.gd;
        rows += `<tr class="${t.qualified ? "qual" : ""}">
          <td class="pos">${idx + 1}</td>
          <td class="team">${t.abbr}${t.qualified ? '<span class="qbadge">✓</span>' : ""}</td>
          <td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td>
          <td>${t.gf}</td><td>${t.gc}</td><td>${dg}</td>
          <td class="pts">${t.pts}</td></tr>`;
      });
      html += `<div class="gtable">
        <table>
          <thead><tr>
            <th></th><th class="teamh">EQUIPO</th><th>PJ</th><th>G</th><th>E</th>
            <th>P</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="glegend"><b>✓</b> Clasificado a la siguiente ronda</div>
      </div>`;
    }

    card.innerHTML = html;
    card.addEventListener("click", () => {          // tocar una card la selecciona/despliega
      matchIndex[tabIndex] = i;
      renderStage();
    });
    cont.appendChild(card);
  });

  $stage.appendChild(cont);

  // puntos del pie = nº de grupos
  groups.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "hdot" + (i === fi ? " on" : "");
    $hdots.appendChild(d);
  });

  // mantener el grupo seleccionado a la vista
  const focusedEl = cont.children[fi];
  if (focusedEl) focusedEl.scrollIntoView({ block: "nearest" });
}

function render() { renderTabs(); renderStage(); }

/* Pantalla de carga inicial: evita mostrar el respaldo (México-Canadá) y que
   "se resetee" cuando llega la respuesta real de la API. */
function renderLoading() {
  renderTabs();
  $stage.classList.remove("scroll");
  $hdots.innerHTML = "";
  $stage.innerHTML = `<div class="notice anim">
    <div class="big">Cargando…</div>
    <div class="sub">Conectando con TheSportsDB</div></div>`;
}

/* =====================================================================
   NAVEGACIÓN
   ===================================================================== */
function changeTab(dir) {                       // dir: +1 abajo, -1 arriba
  const next = tabIndex + dir;
  if (next < 0 || next >= TABS.length) return;
  tabIndex = next;
  render();
}
function changeMatch(dir) {                      // dir: +1 derecha, -1 izquierda
  const list = currentList();
  if (!list.length) return;
  let next = matchIndex[tabIndex] + dir;
  if (next < 0) next = 0;
  if (next >= list.length) next = list.length - 1;
  matchIndex[tabIndex] = next;
  renderStage();
}

/* Teclado (para probar en navegador) */
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowUp")    { changeTab(-1); e.preventDefault(); }
  if (e.key === "ArrowDown")  { changeTab(+1); e.preventDefault(); }
  if (e.key === "ArrowLeft")  { changeMatch(-1); e.preventDefault(); }
  if (e.key === "ArrowRight") { changeMatch(+1); e.preventDefault(); }
});

/* Swipe táctil */
let tStartX = 0, tStartY = 0, tracking = false;
const SWIPE_MIN = 45;     // umbral en px
const app = document.getElementById("app");

function startGesture(x, y) { tStartX = x; tStartY = y; tracking = true; }
function endGesture(x, y) {
  if (!tracking) return;
  tracking = false;
  const dx = x - tStartX, dy = y - tStartY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_MIN) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    changeMatch(dx < 0 ? +1 : -1);   // swipe izquierda => siguiente
  } else {
    changeTab(dy < 0 ? +1 : -1);     // swipe arriba => siguiente pestaña
  }
}

app.addEventListener("touchstart", (e) => { const t = e.changedTouches[0]; startGesture(t.clientX, t.clientY); }, {passive:true});
app.addEventListener("touchend",   (e) => { const t = e.changedTouches[0]; endGesture(t.clientX, t.clientY); }, {passive:true});
/* Soporte ratón (para pruebas en escritorio) */
app.addEventListener("mousedown", (e) => startGesture(e.clientX, e.clientY));
app.addEventListener("mouseup",   (e) => endGesture(e.clientX, e.clientY));

/* =====================================================================
   CELEBRACIÓN DE GOL EN VIVO  ·  sonido + papelitos (confeti)
   Se dispara cuando el marcador de un partido EN VIVO sube entre
   actualizaciones. Pulsa "G" para probar la animación.
   ===================================================================== */
let actx = null;                       // AudioContext (se desbloquea al 1er toque)
function unlockAudio() {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
  } catch (e) { /* sin audio disponible */ }
}

function playGoalSound() {
  if (!actx) return;
  const now = actx.currentTime;
  // corneta de gol (melodía ascendente)
  [[523,0],[659,.12],[784,.24],[1047,.42]].forEach(([f,t]) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "sawtooth"; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now + t);
    g.gain.exponentialRampToValueAtTime(0.25, now + t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.5);
    o.connect(g).connect(actx.destination);
    o.start(now + t); o.stop(now + t + 0.55);
  });
  // rugido de multitud (ruido filtrado que se apaga)
  const dur = 1.8, buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.4);
  const noise = actx.createBufferSource(); noise.buffer = buf;
  const filt = actx.createBiquadFilter(); filt.type = "bandpass"; filt.frequency.value = 900;
  const ng = actx.createGain(); ng.gain.value = 0.14;
  noise.connect(filt).connect(ng).connect(actx.destination);
  noise.start(now + 0.35);
}

function spawnConfetti() {
  let fx = document.getElementById("fx");
  if (!fx) { fx = document.createElement("div"); fx.id = "fx"; app.appendChild(fx); }
  const colors = ["#00e676", "#ffffff", "#ffd400", "#ff3d6e", "#29b6f6", "#ff9100"];
  const N = 90;
  for (let i = 0; i < N; i++) {
    const p = document.createElement("div");
    p.className = "confetti";
    const dur = 1.8 + Math.random() * 1.6;
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[(Math.random() * colors.length) | 0];
    p.style.setProperty("--r", (360 + Math.random() * 720) + "deg");
    p.style.animationDuration = dur + "s";
    p.style.animationDelay = (Math.random() * 0.5) + "s";
    p.style.opacity = (0.7 + Math.random() * 0.3).toFixed(2);
    if (Math.random() < 0.5) p.style.borderRadius = "50%";  // mezcla cuadrados y círculos
    fx.appendChild(p);
    setTimeout(() => p.remove(), (dur + 0.6) * 1000);
  }
}

function showGoalBanner(team) {
  const b = document.createElement("div");
  b.className = "goalbanner";
  b.innerHTML = `<div class="g">¡GOOOL!</div>${team ? `<div class="gt">${team}</div>` : ""}`;
  app.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

function celebrateGoal(team) {
  unlockAudio();
  playGoalSound();
  spawnConfetti();
  showGoalBanner(team);
}

/* desbloqueo de audio + tecla de prueba */
function armAudio() { unlockAudio(); }
app.addEventListener("touchstart", armAudio, { once: true, passive: true });
app.addEventListener("mousedown", armAudio, { once: true });
window.addEventListener("keydown", (e) => { if (e.key === "g" || e.key === "G") celebrateGoal("PRUEBA"); });

/* =====================================================================
   CARGA DESDE API + PARSER  (adapta parseApiResponse a tu proveedor)
   ===================================================================== */
/* Códigos FIFA de 3 letras por selección (las que faltan se autogeneran) */
const TEAM_ABBR = {
  "Mexico":"MEX","Canada":"CAN","USA":"USA","United States":"USA","Argentina":"ARG",
  "Brazil":"BRA","Spain":"ESP","Germany":"GER","France":"FRA","England":"ENG",
  "Portugal":"POR","Uruguay":"URU","Netherlands":"NED","Croatia":"CRO","Belgium":"BEL",
  "Colombia":"COL","Japan":"JPN","South Korea":"KOR","Korea Republic":"KOR","Italy":"ITA",
  "Morocco":"MAR","Senegal":"SEN","Ghana":"GHA","Nigeria":"NGA","Cameroon":"CMR",
  "Egypt":"EGY","Iran":"IRN","Saudi Arabia":"KSA","Qatar":"QAT","Australia":"AUS",
  "Switzerland":"SUI","Denmark":"DEN","Poland":"POL","Sweden":"SWE","Norway":"NOR",
  "Austria":"AUT","Serbia":"SRB","Czech Republic":"CZE","Czechia":"CZE","Wales":"WAL",
  "Scotland":"SCO","Ecuador":"ECU","Peru":"PER","Chile":"CHI","Paraguay":"PAR",
  "Costa Rica":"CRC","Panama":"PAN","Honduras":"HON","Jamaica":"JAM","South Africa":"RSA",
  "Tunisia":"TUN","Algeria":"ALG","Ivory Coast":"CIV","Bosnia-Herzegovina":"BIH",
  "Turkey":"TUR","Greece":"GRE","Ukraine":"UKR","Russia":"RUS","New Zealand":"NZL",
  "Uzbekistan":"UZB","Jordan":"JOR","Cape Verde":"CPV","Curacao":"CUW","Haiti":"HAI"
};
function abbr(name) {
  if (!name) return "???";
  if (TEAM_ABBR[name]) return TEAM_ABBR[name];
  return name.normalize("NFD").replace(/[^A-Za-z ]/g,"").trim().slice(0,3).toUpperCase() || "???";
}

/* Estados de TheSportsDB */
const LIVE_ST  = ["1H","2H","HT","ET","BT","P","LIVE","INPLAY","BREAK"];
const FINAL_ST = ["FT","AET","PEN","FT_PEN","MATCH FINISHED","AWARDED"];

/* Fecha/hora de inicio (Date) a partir del timestamp del evento; null si no hay */
function kickoffDate(ev) {
  const ts = ev.strTimestamp || (ev.dateEvent && ev.strTime ? ev.dateEvent + "T" + ev.strTime
            : (ev.dateEvent ? ev.dateEvent + "T00:00:00" : null));
  if (!ts) return null;
  const d = new Date(ts.endsWith("Z") || ts.includes("+") ? ts : ts + "Z");
  return isNaN(d) ? null : d;
}

function fmtTime(ev) {              // hora local del usuario a partir del timestamp
  const d = kickoffDate(ev);
  if (!d) return ev.strTime ? ev.strTime.slice(0,5) : "—";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDay(ev) {               // día local (se adapta al país del usuario)
  const d = kickoffDate(ev);
  if (!d) return "";
  return d.toLocaleDateString([], { weekday: "short", day: "2-digit", month: "short" });
}

/* Convierte un evento de TheSportsDB a nuestra estructura, según su estado */
function mapEvent(ev) {
  const st = (ev.strStatus || "").toUpperCase().trim();
  const homeName = ev.strHomeTeam, awayName = ev.strAwayTeam;
  const hs = ev.intHomeScore, as = ev.intAwayScore;
  const base = {
    id: ev.idEvent,
    comp: (ev.strLeague || "MUNDIAL").toUpperCase(),
    home: abbr(homeName), homeName, away: abbr(awayName), awayName,
  };
  const ko = kickoffDate(ev);
  const started = ko ? Date.now() >= ko.getTime() : false;   // ¿ya empezó (o pasó) el partido?
  const hasScore = hs != null && hs !== "" && as != null && as !== "";

  if (LIVE_ST.includes(st) || (ev.strProgress && ev.strProgress !== "" && !FINAL_ST.includes(st))) {
    return { bucket: "live", item: { ...base, hs: +hs||0, as: +as||0, status: "live",
      minute: ev.strProgress ? ev.strProgress + "'" : (st === "HT" ? "DESC." : "EN VIVO") } };
  }
  // FINAL solo si el estado lo dice, o si hay marcador Y el partido ya se jugó.
  // (TheSportsDB suele mandar 0-0 como placeholder en partidos futuros: NO son finales)
  if (FINAL_ST.includes(st) || (hasScore && started)) {
    return { bucket: "results", item: { ...base, hs: +hs||0, as: +as||0, status: "final" } };
  }
  return { bucket: "upcoming", item: { ...base, status: "upcoming", time: fmtTime(ev), day: fmtDay(ev),
    probHome: null, probDraw: null, probAway: null } };   // TheSportsDB gratis no da probabilidades
}

async function getJSON(path) {
  const url = `${API_CONFIG.BASE_URL}/${API_CONFIG.API_KEY}/${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

/* Convierte la tabla (lookuptable) de TheSportsDB en grupos con clasificados.
   Marca ✓ si strDescription indica clasificación, o por defecto a los 2 primeros. */
function buildGroupsFromTable(rows) {
  if (!rows || !rows.length) return null;
  const byGroup = {};
  for (const r of rows) {
    const gname = (r.strGroup || "GRUPO").replace(/group/i, "GRUPO").toUpperCase().trim();
    (byGroup[gname] = byGroup[gname] || []).push({
      abbr: abbr(r.strTeam), name: r.strTeam,
      pj:+r.intPlayed||0, g:+r.intWin||0, e:+r.intDraw||0, p:+r.intLoss||0,
      gf:+r.intGoalsFor||0, gc:+r.intGoalsAgainst||0,
      gd: (r.intGoalDifference != null && r.intGoalDifference !== "")
            ? +r.intGoalDifference : (+r.intGoalsFor||0) - (+r.intGoalsAgainst||0),
      pts:+r.intPoints||0, rank:+r.intRank||99,
      qualified: /qualif|promot|advance|round of|knockout|clasif|próxim/i.test(r.strDescription || "")
    });
  }
  return Object.keys(byGroup).sort().map(name => {
    const teams = byGroup[name].sort((a,b) => a.rank-b.rank || b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    const anyQ = teams.some(t => t.qualified);
    teams.forEach((t,i) => { if (!anyQ) t.qualified = i < 2; });   // por defecto: 2 primeros
    return { name, teams };
  });
}

/* Lista de fechas YYYY-MM-DD desde hoy (UTC) hacia adelante */
function nextDates(n) {
  const arr = [];
  const d = new Date();
  for (let i = 0; i < n; i++) {
    arr.push(d.toISOString().slice(0, 10));
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return arr;
}

async function loadData() {
  if (!API_CONFIG.ENABLED) { DATA = FALLBACK_DATA; render(); return; }
  try {
    const L = API_CONFIG.LEAGUE_ID, S = API_CONFIG.SEASON;
    // La clave gratis solo da 1 próximo en eventsnextleague, así que completamos
    // los partidos REALES que faltan consultando día por día (hoy en adelante).
    const dayCalls = nextDates(18).map(d => getJSON(`eventsday.php?d=${d}&l=${L}`));
    // Fuentes base: pasados (incluye EN VIVO), próximos, temporada y tabla de grupos
    const settled = await Promise.allSettled([
      getJSON(`eventspastleague.php?id=${L}`),
      getJSON(`eventsnextleague.php?id=${L}`),
      getJSON(`eventsseason.php?id=${L}&s=${S}`),
      getJSON(`lookuptable.php?l=${L}&s=${S}`),
      ...dayCalls,
    ]);
    const [past, next, season, table, ...days] = settled;
    const evs = [];
    for (const r of [past, next, season, ...days]) {
      if (r.status === "fulfilled" && r.value && r.value.events) evs.push(...r.value.events);
    }
    // dedupe por idEvent
    const seen = new Set();
    const out = { live: [], results: [], upcoming: [] };
    for (const ev of evs) {
      if (!ev || seen.has(ev.idEvent)) continue;
      seen.add(ev.idEvent);
      const { bucket, item } = mapEvent(ev);
      out[bucket].push({ ...item, _ts: ev.strTimestamp || ev.dateEvent || "" });
    }
    // ordenar: resultados más recientes primero; próximos más cercanos primero
    out.results.sort((a, b) => (b._ts > a._ts ? 1 : -1));
    out.upcoming.sort((a, b) => (a._ts > b._ts ? 1 : -1));
    diffLive(out.live, false);   // fija la línea base (sin celebrar en la carga inicial)

    // tabla de grupos: usa la real si trae datos suficientes, si no, respaldo
    let groups = null;
    if (table.status === "fulfilled" && table.value) groups = buildGroupsFromTable(table.value.table);
    const teamCount = groups ? groups.reduce((n, g) => n + g.teams.length, 0) : 0;
    out.groups = teamCount >= 8 ? groups : FALLBACK_GROUPS;

    const total = out.live.length + out.results.length + out.upcoming.length;
    DATA = total ? out : FALLBACK_DATA;     // respuesta vacía => respaldo
  } catch (err) {
    console.warn("API falló, usando datos de respaldo:", err);
    DATA = FALLBACK_DATA;
  }
  render();
}

/* =====================================================================
   GOLES EN VIVO  ·  detección por cambio de marcador + sondeo periódico
   ===================================================================== */
let prevLive = {};   // idEvent -> { hs, as } del último sondeo

/* Compara el marcador en vivo con el anterior; si subió, celebra el gol.
   celebrate=false solo guarda la línea base (sin festejar). */
function diffLive(liveItems, celebrate) {
  const nextMap = {};
  let goalId = null;                 // id del partido donde cayó el gol (para enfocarlo)
  for (const it of liveItems) {
    const hs = it.hs || 0, as = it.as || 0;
    nextMap[it.id] = { hs, as };
    if (celebrate) {
      const prev = prevLive[it.id];
      if (prev) {
        if (hs > prev.hs)      { celebrateGoal(it.homeName || it.home); goalId = it.id; }
        else if (as > prev.as) { celebrateGoal(it.awayName || it.away); goalId = it.id; }
      }
    }
  }
  prevLive = nextMap;
  return goalId;
}

/* Sondea los partidos recientes (incluye EN VIVO) y festeja goles nuevos */
async function pollLive() {
  if (!API_CONFIG.ENABLED) return;
  try {
    const r = await getJSON(`eventspastleague.php?id=${API_CONFIG.LEAGUE_ID}`);
    if (!r || !r.events) return;
    const live = [], seen = new Set();
    for (const ev of r.events) {
      if (!ev || seen.has(ev.idEvent)) continue;
      seen.add(ev.idEvent);
      const { bucket, item } = mapEvent(ev);
      if (bucket === "live") live.push({ ...item, _ts: ev.strTimestamp || ev.dateEvent || "" });
    }
    const goalId = diffLive(live, true);        // celebra goles nuevos
    DATA.live = live;                           // refresca el bucket en vivo
    if (goalId != null) {
      // gol: salta a EN VIVO y enfoca el partido que anotó
      const liveTab = TABS.findIndex(t => t.key === "live");
      const idx = live.findIndex(x => x.id === goalId);
      if (liveTab >= 0) { tabIndex = liveTab; if (idx >= 0) matchIndex[liveTab] = idx; }
      render();
    } else if (TABS[tabIndex].key === "live") {
      renderStage();
    }
  } catch (e) { /* ignora fallos de red puntuales */ }
}

/* arranque */
renderLoading();   // muestra "Cargando…" hasta que loadData() pinte datos reales
loadData();
setInterval(pollLive, 30 * 1000);   // revisa goles en vivo cada 30 s

/* Prueba de celebración: abre la web con  ?gol=1  (o #gol) y a los ~3 s
   dispara una celebración de gol automática, sin teclado. Ideal para
   verificar en los Ray-Ban Display que se ven los papelitos y el cartel.
   (El sonido solo suena si tocas la pantalla una vez antes.) */
if (/[?&#]gol=1/.test(location.href) || location.hash === "#gol") {
  setTimeout(() => celebrateGoal("PRUEBA"), 3000);
  setTimeout(() => celebrateGoal("PRUEBA"), 8000);   // repite por si te lo perdiste
}
